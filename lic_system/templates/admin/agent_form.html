{% extends "admin/base.html" %}
{% block title %}{{ 'Edit' if agent else 'Add' }} Agent{% endblock %}
{% block breadcrumb %} / <a href="{{ url_for('agents.index') }}">Agents</a> / <span>{{ 'Edit' if agent else 'Add' }}</span>{% endblock %}
{% block content %}
<div class="page-header"><h1 class="page-title">{{ 'Edit Agent' if agent else 'Add New Agent' }}</h1><a href="{{ url_for('agents.index') }}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a></div>
<form method="POST" class="form-card" novalidate>
  <div class="form-section"><h4 class="form-section-title"><i class="fas fa-user-tie"></i> Agent Details</h4>
    <div class="form-grid-2">
      <div class="form-group"><label>Full Name *</label><input type="text" name="full_name" class="form-control" value="{{ agent.full_name if agent else '' }}" required/></div>
      <div class="form-group"><label>Email *</label><input type="email" name="email" class="form-control" value="{{ agent.email if agent else '' }}" required/></div>
      <div class="form-group"><label>Mobile *</label><input type="tel" name="mobile" class="form-control" value="{{ agent.mobile if agent else '' }}" required/></div>
      <div class="form-group"><label>License Number</label><input type="text" name="license_number" class="form-control" value="{{ agent.license_number if agent else '' }}"/></div>
      <div class="form-group"><label>Commission Rate (%)</label><input type="number" name="commission_rate" class="form-control" step="0.01" value="{{ agent.commission_rate if agent else '5.00' }}"/></div>
      <div class="form-group"><label>Joining Date</label><input type="date" name="joined_date" class="form-control" value="{{ agent.joined_date if agent and agent.joined_date else '' }}"/></div>
      <div class="form-group"><label>City</label><input type="text" name="city" class="form-control" value="{{ agent.city if agent else '' }}"/></div>
      <div class="form-group"><label>State</label><input type="text" name="state" class="form-control" value="{{ agent.state if agent else '' }}"/></div>
    </div>
    <div class="form-group"><label>Address</label><textarea name="address" class="form-control" rows="2">{{ agent.address if agent else '' }}</textarea></div>
    <div class="form-group"><label>Status</label><select name="status" class="form-control"><option value="active" {% if not agent or agent.status=='active' %}selected{% endif %}>Active</option><option value="inactive" {% if agent and agent.status=='inactive' %}selected{% endif %}>Inactive</option></select></div>
  </div>
  <div class="form-actions">
    <a href="{{ url_for('agents.index') }}" class="btn btn-outline">Cancel</a>
    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> {{ 'Update' if agent else 'Add' }} Agent</button>
  </div>
</form>
{% endblock %}
